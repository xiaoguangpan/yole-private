<script type="text/babel" data-presets="env,react">
function App() {
  return (
    <DesignCanvas>
      <DCSection

        title="Yole · v0.1 关键界面"

      >
        <DCArtboard id="ab-onboarding" label="01 · Onboarding · Health Check" width={1180} height={780}>
          <div data-screen-label="01 Onboarding">
            <MacChrome width={1180} height={780} title="Yole · 设置">
              <Onboarding />
            </MacChrome>
          </div>
        </DCArtboard>

        <DCArtboard id="ab-empty" label="02 · Empty State · 你想做什么" width={1280} height={820}>
          <div data-screen-label="02 Empty">
            <MacChrome width={1280} height={820} title="Yole">

            </MacChrome>

          <div data-screen-label="05 Approval">
            <MacChrome width={1240} height={880} title="Approval · file_patch">
              <ApprovalCardShowcase />
            </MacChrome>
          </div>
