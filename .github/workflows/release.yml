name: Release

# Tag-triggered release. Push a tag matching `v*` (e.g. `v0.2.0`) on main
# to fire this workflow. It produces three artifacts in parallel:
#
#   - Galley_<version>_aarch64.dmg    (Apple Silicon Mac, macos-14 runner)
#   - Galley_<version>_x64.dmg        (Intel Mac,         macos-13 runner)
#   - Galley_<version>_x64-setup.exe  (Windows,           windows-latest runner)
#
# After all three build, a final job collects them and creates a DRAFT
# GitHub Release. JC reviews the auto-generated notes, smoke-tests each
# artifact, then publishes.
#
# Prerelease detection: tags containing `-` (e.g. `v0.2.0-rc.1`) are
# marked as prerelease so they don't show as "latest" to users.
#
# Pre-build gates: every matrix job runs `pnpm typecheck`, `pnpm lint`,
# and `cargo check` before bundling. A failure on any platform aborts
# its job (fail-fast: false keeps the other platforms going so we get
# a complete failure picture).
#
# When macos-13 (Intel) gets removed from GitHub Actions (TBD, 2026-27),
# either drop the macos-13 matrix row (Intel users build locally from
# JC's x64 Mac) or rewrite to cross-compile aarch64 → x86_64 from
# macos-14. See docs/release-workflow.md §"Intel runner deprecation".

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            target: aarch64-apple-darwin
            arch: aarch64
            bundle_dir: dmg
            bundle_glob: "*.dmg"
          - platform: macos-13
            target: x86_64-apple-darwin
            arch: x64
            bundle_dir: dmg
            bundle_glob: "*.dmg"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            bundle_dir: nsis
            bundle_glob: "*-setup.exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: ./desktop
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: ./desktop
        run: pnpm typecheck

      - name: Lint
        working-directory: ./desktop
        run: pnpm lint

      - name: Cargo check
        working-directory: ./desktop/src-tauri
        run: cargo check --target ${{ matrix.target }}

      - name: Build Tauri bundle
        working-directory: ./desktop
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: galley-${{ matrix.platform }}-${{ matrix.arch }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}/${{ matrix.bundle_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Detect prerelease
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          name: Galley ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
