name: Release

# Tag-triggered release. Push a tag matching `v*` (e.g. `v0.2.0`) on main
# to fire this workflow. It produces three primary artifacts in parallel:
#
#   - Yole_<version>_macOS_aarch64.dmg       (Apple Silicon Mac)
#   - Yole_<version>_macOS_x64.dmg           (Intel Mac)
#   - Yole_<version>_Windows_x64-setup.exe   (Windows)
#
# Mac Intel uses macos-15's Apple Silicon runner with cross-compile +
# Rosetta 2. This keeps Intel artifacts in the official CI release path
# without relying on deprecated Intel-hosted macOS runners.
#
# macOS runner is macos-15 (Sequoia) as of the v0.1.0-alpha.2 CI
# maintenance: macos-14 (Sonoma) begins GitHub-hosted deprecation
# 2026-07-06 with full unsupport by 2026-11-02. A first attempt at
# macos-26 (Tahoe) hit a PATH/Rust-toolchain conflict — macos-26
# pre-installs Rust 1.95.0 + rustup, and `dtolnay/rust-toolchain@
# stable`'s setup ends up with `cargo` resolving to a `rustup-init`
# shim instead of the real cargo, so `cargo check` errors with
# "unexpected argument 'check' found". macos-15 has been GA for
# months and works cleanly with our existing Rust setup. Revisit
# macos-26 once dtolnay/rust-toolchain catches up (or we move to
# system Rust on the runner).
#
# After all builds finish, a final job collects them and creates a DRAFT
# GitHub Release. JC reviews the auto-generated notes, smoke-tests each
# artifact, then publishes.
#
# Prerelease detection: tags containing `-` (e.g. `v0.2.0-rc.1`) are
# marked as prerelease so they don't show as "latest" to users.
#
# Pre-build gates: every matrix job runs `pnpm typecheck`, `pnpm lint`,
# and `cargo check` before bundling. A failure on any platform aborts
# its job (fail-fast: false keeps the other platforms going so we get
# a complete failure picture).

on:
  push:
    tags:
      - "v*"
  # Manual dispatch (Actions UI → "Release" workflow → "Run workflow") lets
  # JC validate the workflow end-to-end without polluting git tags or
  # the Releases page. On manual dispatch we build all release targets
  # but skip the `release` job that creates the GitHub Release draft —
  # because there's no tag to associate the release with anyway.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            arch: aarch64
            bundle_dir: dmg
            bundle_glob: "*.dmg"
          # Mac Intel via cross-compile on macos-15 (arm64 runner).
          # bundle-python.sh installs x86_64 PBS Python and pip-installs
          # GA deps using it, so Rosetta 2 is required on this host.
          - platform: macos-15
            target: x86_64-apple-darwin
            arch: x64
            bundle_dir: dmg
            bundle_glob: "*.dmg"
          - platform: windows-2022
            target: x86_64-pc-windows-msvc
            arch: x64
            bundle_dir: nsis
            bundle_glob: "*-setup.exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # pnpm version comes from the root package.json `packageManager`
        # field. Do not also pass `with.version`; pnpm/action-setup
        # treats the duplicate as a release-blocking mismatch.

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./core -> target

      - name: Validate updater signing config
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          YOLE_UPDATER_PUBKEY: ${{ vars.YOLE_UPDATER_PUBKEY }}
          YOLE_UPDATER_ENDPOINT: ${{ vars.YOLE_UPDATER_ENDPOINT }}
          YOLE_PROVISIONER_URL: ${{ vars.YOLE_PROVISIONER_URL }}
        run: |
          missing=0
          if [[ -z "$TAURI_SIGNING_PRIVATE_KEY" ]]; then
            echo "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY." >&2
            missing=1
          fi
          if [[ -z "$YOLE_UPDATER_PUBKEY" ]]; then
            echo "Missing GitHub variable YOLE_UPDATER_PUBKEY." >&2
            missing=1
          elif ! node -e 'const key = Buffer.from(process.env.YOLE_UPDATER_PUBKEY, "base64").toString("utf8"); if (!key.startsWith("untrusted comment:")) process.exit(1);'; then
            echo "GitHub variable YOLE_UPDATER_PUBKEY must be the base64 Tauri updater public key." >&2
            missing=1
          fi
          if [[ -z "$YOLE_UPDATER_ENDPOINT" ]]; then
            echo "Missing GitHub variable YOLE_UPDATER_ENDPOINT." >&2
            missing=1
          elif [[ "$YOLE_UPDATER_ENDPOINT" != https://* ]]; then
            echo "GitHub variable YOLE_UPDATER_ENDPOINT must be an HTTPS URL." >&2
            missing=1
          fi
          if [[ -z "$YOLE_PROVISIONER_URL" ]]; then
            echo "Missing GitHub variable YOLE_PROVISIONER_URL." >&2
            missing=1
          elif [[ "$YOLE_PROVISIONER_URL" != https://* ]]; then
            echo "GitHub variable YOLE_PROVISIONER_URL must be an HTTPS URL." >&2
            missing=1
          fi
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Write updater release config
        shell: bash
        env:
          YOLE_UPDATER_PUBKEY: ${{ vars.YOLE_UPDATER_PUBKEY }}
          YOLE_UPDATER_ENDPOINT: ${{ vars.YOLE_UPDATER_ENDPOINT }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const config = {
            build: {
              // The matrix already prepares the CLI sidecar in a cross-platform
              // step. Keep Tauri's Windows beforeBuildCommand out of bash-only
              // repo scripts and leave this phase to the frontend build.
              beforeBuildCommand: "pnpm --dir gui build",
            },
            bundle: {
              createUpdaterArtifacts: true,
            },
            plugins: {
              updater: {
                pubkey: process.env.YOLE_UPDATER_PUBKEY,
                endpoints: [process.env.YOLE_UPDATER_ENDPOINT],
              },
            },
          };

          fs.writeFileSync(
            "core/tauri.updater.generated.conf.json",
            `${JSON.stringify(config, null, 2)}\n`,
          );
          NODE

      - name: Install frontend deps
        working-directory: ./gui
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: ./gui
        run: pnpm typecheck

      - name: Lint
        working-directory: ./gui
        run: pnpm lint

      # Mac Intel cross-compile uses x86_64 PBS Python on the arm64
      # macos-15 runner. `bundle-python.sh mac-x64` runs that x86_64
      # binary (`python -m pip install ...`) — requires Rosetta 2 on
      # an Apple Silicon host. GHA's macos-15 image doesn't pre-install
      # Rosetta; we add it here, conditional on the matrix target.
      # Cheap on other matrix entries (`if:` evaluates false, step
      # skipped — no time cost).
      - name: Install Rosetta 2 (x86_64 cross-compile on arm64 host)
        if: matrix.target == 'x86_64-apple-darwin'
        run: softwareupdate --install-rosetta --agree-to-license

      # v0.1.1+ Yole ships a bundled CPython 3.11 + GA core deps at
      # $RESOURCE/python/. `scripts/bundle-python.sh` downloads the
      # python-build-standalone tarball, strips non-essential stdlib,
      # pip-installs Yole's audited GA runtime deps, and smoke-tests
      # the vendored managed-ga/code payload against that interpreter.
      # Output lands in
      # core/python-bundle/python/, which tauri.conf.json's
      # bundle.resources mapping copies into the .app / NSIS payload.
      #
      # MUST run before Cargo check / Build: Tauri's build.rs validates
      # bundle.resources path existence at cargo build time. Empty /
      # missing dir → resource resolver hard-fails with `resource path
      # 'python-bundle/python' doesn't exist`. Placing this step before
      # the cargo check is therefore load-bearing, not just for the
      # later `tauri build` artifact.
      - name: Setup Python (for bundle pip install)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache python-build-standalone tarball
        uses: actions/cache@v5
        with:
          path: .cache/pbs
          key: pbs-tarball-${{ matrix.target }}-20260510

      - name: Bundle Python interpreter + GA core deps
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)   ARCH=mac-arm64 ;;
            x86_64-apple-darwin)    ARCH=mac-x64 ;;
            x86_64-pc-windows-msvc) ARCH=win-x64 ;;
            *) echo "Unmapped target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          ./scripts/bundle-python.sh "$ARCH"

      - name: Managed GA payload gate
        run: node scripts/check-managed-ga-payload.mjs

      - name: Prepare CLI sidecar
        shell: bash
        run: node scripts/prepare-cli-sidecar.mjs --target ${{ matrix.target }}

      - name: Cargo check
        working-directory: ./core
        run: cargo check --target ${{ matrix.target }}

      - name: Build Tauri bundle
        working-directory: ./gui
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          YOLE_UPDATER_PUBKEY: ${{ vars.YOLE_UPDATER_PUBKEY }}
          YOLE_UPDATER_ENDPOINT: ${{ vars.YOLE_UPDATER_ENDPOINT }}
          YOLE_PROVISIONER_URL: ${{ vars.YOLE_PROVISIONER_URL }}
          TAURI_ENV_TARGET_TRIPLE: ${{ matrix.target }}
        run: pnpm tauri build --target ${{ matrix.target }} --config tauri.updater.generated.conf.json

      - name: Managed GA app bundle gate
        if: matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        run: node scripts/check-managed-ga-app-bundle.mjs core/target/${{ matrix.target }}/release/bundle/macos/Yole.app

      # Tauri's bundler names artifacts `Yole_<version>_<arch>.<ext>`
      # with no `artifactName` config to customize. Post-build, insert
      # the OS slug (macOS / Windows) so users see what they're
      # downloading without having to recognize the file extension.
      # Helper is idempotent — safe to re-run.
      - name: Rename artifact (insert OS slug)
        shell: bash
        run: ./scripts/rename-artifact.sh ${{ matrix.target }}

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          out="artifacts/${{ matrix.target }}"
          bundle_root="core/target/${{ matrix.target }}/release/bundle"
          version="$(node -p 'require("./core/tauri.conf.json").version')"
          mkdir -p "$out"

          primary_files=("$bundle_root/${{ matrix.bundle_dir }}"/${{ matrix.bundle_glob }})
          if (( ${#primary_files[@]} == 0 )); then
            echo "No primary bundle found in $bundle_root/${{ matrix.bundle_dir }}." >&2
            find "$bundle_root" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          cp "${primary_files[@]}" "$out/"

          updater_count=0
          expected_updater_count=0
          case "${{ matrix.target }}" in
            *-apple-darwin)
              expected_updater_count=2
              for file in "$bundle_root/macos"/*.app.tar.gz "$bundle_root/macos"/*.app.tar.gz.sig; do
                name="$(basename "$file")"
                suffix="${name#*.app.tar.gz}"
                cp "$file" "$out/Yole_${version}_macOS_${{ matrix.arch }}.app.tar.gz${suffix}"
                updater_count=$((updater_count + 1))
              done
              ;;
            *-pc-windows-msvc)
              expected_updater_count=1
              setup_files=("$out"/*_Windows_*-setup.exe)
              for file in "$bundle_root/nsis"/*-setup.exe.sig; do
                if (( ${#setup_files[@]} == 1 )); then
                  cp "$file" "$out/$(basename "${setup_files[0]}").sig"
                else
                  cp "$file" "$out/$(basename "$file")"
                fi
                updater_count=$((updater_count + 1))
              done
              ;;
            *)
              echo "Unmapped updater target: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac
          if (( updater_count < expected_updater_count )); then
            echo "No updater artifacts found in $bundle_root." >&2
            find "$bundle_root" -maxdepth 3 -type f -print >&2
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: yole-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/${{ matrix.target }}/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    # Only create a GitHub Release when fired from a real tag push.
    # workflow_dispatch (manual dry-run) builds artifacts but stops here.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate updater manifest candidate
        run: |
          node scripts/generate-tauri-update-manifest.mjs \
            --artifacts artifacts \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}" \
            --out artifacts/latest.json

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Detect prerelease
        id: meta
        shell: bash
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$REF_NAME" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          name: Yole ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
