name: Release

# Tag-triggered release. Push a tag matching `v*` (e.g. `v0.2.0`) on main
# to fire this workflow. It produces two artifacts in parallel:
#
#   - Galley_<version>_aarch64.dmg    (Apple Silicon Mac, macos-15 runner)
#   - Galley_<version>_x64-setup.exe  (Windows,           windows-latest runner)
#
# Mac Intel (x86_64-apple-darwin) was dropped from the matrix in
# v0.1.0-alpha.2 — JC's dev machine is an Intel Mac so an Intel bundle
# can be produced locally on demand, and the GitHub-hosted macos-13
# runner is on track for removal anyway (TBD, 2026-27; see
# docs/release-workflow.md §"Intel runner deprecation"). Re-add the
# matrix row if/when a sizable user base needs official Intel binaries.
#
# macOS runner is macos-15 (Sequoia) as of the v0.1.0-alpha.2 CI
# maintenance: macos-14 (Sonoma) begins GitHub-hosted deprecation
# 2026-07-06 with full unsupport by 2026-11-02. A first attempt at
# macos-26 (Tahoe) hit a PATH/Rust-toolchain conflict — macos-26
# pre-installs Rust 1.95.0 + rustup, and `dtolnay/rust-toolchain@
# stable`'s setup ends up with `cargo` resolving to a `rustup-init`
# shim instead of the real cargo, so `cargo check` errors with
# "unexpected argument 'check' found". macos-15 has been GA for
# months and works cleanly with our existing Rust setup. Revisit
# macos-26 once dtolnay/rust-toolchain catches up (or we move to
# system Rust on the runner).
#
# After both build, a final job collects them and creates a DRAFT
# GitHub Release. JC reviews the auto-generated notes, smoke-tests each
# artifact, then publishes.
#
# Prerelease detection: tags containing `-` (e.g. `v0.2.0-rc.1`) are
# marked as prerelease so they don't show as "latest" to users.
#
# Pre-build gates: every matrix job runs `pnpm typecheck`, `pnpm lint`,
# and `cargo check` before bundling. A failure on any platform aborts
# its job (fail-fast: false keeps the other platforms going so we get
# a complete failure picture).

on:
  push:
    tags:
      - "v*"
  # Manual dispatch (Actions UI → "Release" workflow → "Run workflow") lets
  # JC validate the workflow end-to-end without polluting git tags or
  # the Releases page. On manual dispatch we build both platforms
  # but skip the `release` job that creates the GitHub Release draft —
  # because there's no tag to associate the release with anyway.
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            arch: aarch64
            bundle_dir: dmg
            bundle_glob: "*.dmg"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
            bundle_dir: nsis
            bundle_glob: "*-setup.exe"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # Pin major version explicitly — the action's
          # auto-detection from `packageManager` looks at
          # `./package.json` (repo root) by default, but Galley's
          # frontend package.json lives at desktop/package.json.
          # Bumping pnpm locally → bump this line too.
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./desktop/src-tauri -> target

      - name: Install frontend deps
        working-directory: ./desktop
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: ./desktop
        run: pnpm typecheck

      - name: Lint
        working-directory: ./desktop
        run: pnpm lint

      # v0.1.1+ Galley ships a bundled CPython 3.11 + GA core deps at
      # $RESOURCE/python/. `scripts/bundle-python.sh` downloads the
      # python-build-standalone tarball, strips non-essential stdlib,
      # and pip-installs GA's four deps. Output lands in
      # desktop/src-tauri/python-bundle/python/, which tauri.conf.json's
      # bundle.resources mapping copies into the .app / NSIS payload.
      #
      # MUST run before Cargo check / Build: Tauri's build.rs validates
      # bundle.resources path existence at cargo build time. Empty /
      # missing dir → resource resolver hard-fails with `resource path
      # 'python-bundle/python' doesn't exist`. Placing this step before
      # the cargo check is therefore load-bearing, not just for the
      # later `tauri build` artifact.
      - name: Setup Python (for bundle pip install)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache python-build-standalone tarball
        uses: actions/cache@v4
        with:
          path: .cache/pbs
          key: pbs-tarball-${{ matrix.target }}-20260510

      - name: Bundle Python interpreter + GA core deps
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)   ARCH=mac-arm64 ;;
            x86_64-apple-darwin)    ARCH=mac-x64 ;;
            x86_64-pc-windows-msvc) ARCH=win-x64 ;;
            *) echo "Unmapped target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          ./scripts/bundle-python.sh "$ARCH"

      - name: Cargo check
        working-directory: ./desktop/src-tauri
        run: cargo check --target ${{ matrix.target }}

      - name: Build Tauri bundle
        working-directory: ./desktop
        run: pnpm tauri build --target ${{ matrix.target }}

      # Tauri's bundler names artifacts `Galley_<version>_<arch>.<ext>`
      # with no `artifactName` config to customize. Post-build, insert
      # the OS slug (macOS / Windows) so users see what they're
      # downloading without having to recognize the file extension.
      # Helper is idempotent — safe to re-run.
      - name: Rename artifact (insert OS slug)
        shell: bash
        run: ./scripts/rename-artifact.sh ${{ matrix.target }}

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: galley-${{ matrix.platform }}-${{ matrix.arch }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/${{ matrix.bundle_dir }}/${{ matrix.bundle_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    # Only create a GitHub Release when fired from a real tag push.
    # workflow_dispatch (manual dry-run) builds artifacts but stops here.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lR artifacts/

      - name: Detect prerelease
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          prerelease: ${{ steps.meta.outputs.prerelease }}
          name: Galley ${{ github.ref_name }}
          generate_release_notes: true
          files: artifacts/**/*
          fail_on_unmatched_files: true
