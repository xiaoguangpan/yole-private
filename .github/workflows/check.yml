name: Check

# Pre-merge sanity check. Runs on every PR targeting main + every push
# to main. Verifies release-target health WITHOUT producing release
# artifacts, so it stays much faster than the release workflow.
#
# Gates: actionlint, pnpm typecheck, pnpm lint, managed GA payload
# check, cargo check, and cargo test. Target jobs run in parallel;
# fail-fast: false so every platform reports independently and we get
# a complete picture.
#
# When this fails on Win but not Mac, you've likely introduced an
# OS-conditional bug — the most common reason a Mac-led codebase
# needs a multi-platform check.
#
# Matrix mirrors release.yml's supported targets: macOS Apple Silicon,
# macOS Intel via cross-compile on macos-15, and Windows x64.

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Actionlint
        uses: rhysd/actionlint@v1.7.12

  frontend:
    name: Frontend and managed payload
    needs: workflow-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        # pnpm version comes from the root package.json `packageManager`
        # field. Do not also pass `with.version`; pnpm/action-setup
        # treats the duplicate as a release-blocking mismatch.

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: gui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: ./gui
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: ./gui
        run: pnpm typecheck

      - name: Lint
        working-directory: ./gui
        run: pnpm lint

      - name: Managed GA payload gate
        run: node scripts/check-managed-ga-payload.mjs

  check:
    name: Core (${{ matrix.target }})
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
          - platform: macos-15
            target: x86_64-apple-darwin
          - platform: windows-2022
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./core -> target

      # tauri-build's build.rs validates that every path in
      # tauri.conf.json's bundle.resources exists at cargo check time
      # (not just at `tauri build` time). `core/python-bundle/python` is
      # gitignored and regenerated by scripts/bundle-python.sh in
      # release.yml — but Check workflow only verifies type-correctness
      # and doesn't ship artifacts, so running the real bundle costs
      # ~30s per matrix job for no signal value (release.yml already
      # exercises bundle-python.sh on every tagged release). A stub
      # empty dir satisfies tauri-build's `exists()` check at near-zero
      # cost. Re-evaluate if tauri-build ever validates contents (it
      # only does an existence check today).
      - name: Stub python-bundle directory (for cargo check)
        shell: bash
        run: mkdir -p core/python-bundle/python

      - name: Prepare CLI sidecar (for cargo check)
        shell: bash
        run: node scripts/prepare-cli-sidecar.mjs --profile debug --target ${{ matrix.target }}

      - name: Install Rosetta 2 (x86_64 tests on arm64 host)
        if: matrix.target == 'x86_64-apple-darwin'
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Cargo check
        working-directory: ./core
        run: cargo check --target ${{ matrix.target }}

      # B2 M1 added a real Rust test suite. `cargo check` only validates
      # compilation; `cargo test` is where IPC parsing, LRU eviction, and
      # command shapes get exercised.
      #
      # On Windows, the `src/lib.rs` unit-test harness currently fails before
      # any Rust test executes with STATUS_ENTRYPOINT_NOT_FOUND after Tauri
      # updater/process plugins are linked into the app crate. Cargo's
      # `--tests` selector still invokes that lib harness, so Windows runs the
      # integration targets explicitly. macOS still runs the full lib +
      # integration suite.
      #
      # We do NOT run `--workspace` here — the workspace currently includes
      # `core` + `../cli`, and the CLI's integration tests need the
      # `yole` binary built first, which is a slower job. Per-package
      # runs let each fail independently and report clearly.
      - name: Cargo test (core, full)
        if: matrix.target != 'x86_64-pc-windows-msvc'
        working-directory: ./core
        run: cargo test --target ${{ matrix.target }} -p yole-core

      - name: Cargo test (core, Windows integration)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        working-directory: ./core
        run: |
          cargo test --target ${{ matrix.target }} -p yole-core --test db_test
          cargo test --target ${{ matrix.target }} -p yole-core --test db_writes_test
          cargo test --target ${{ matrix.target }} -p yole-core --test runner_manager_test
          cargo test --target ${{ matrix.target }} -p yole-core --test socket_listener_test

      - name: Cargo test (cli)
        working-directory: ./core
        run: cargo test --target ${{ matrix.target }} -p yole-cli
