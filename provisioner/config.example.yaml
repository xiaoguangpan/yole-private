server:
  listen: "127.0.0.1:8080"
  public_base_url: "https://na.itxgp.com/yole-provisioner"
  read_timeout_seconds: 15
  write_timeout_seconds: 30

newapi:
  base_url: "https://na.itxgp.com"
  admin_token: "replace-with-admin-system-access-token"
  admin_user_id: 1
  public_v1_base_url: "https://na.itxgp.com/v1"
  request_timeout_seconds: 30

trial:
  token_prefix: "yole"
  initial_credit_usd: 30
  low_balance_usd: 3
  user_group: "yole"
  token_group: "yole"
  default_model: "deepseek-v4-pro"
  allowed_models:
    - "deepseek-v4-pro"
    - "gpt-5.5"
    - "qwen3.7-plus"
    - "gpt-image-2"

points:
  per_usd: 100
  unit: "积分"

model_routing:
  version: "2026-06-15.1"
  default_profile: "yole_standard"
  profiles:
    yole_standard:
      newapi_group: "yole"
      conversation:
        - "deepseek-v4-pro"
        - "gpt-5.5"
      vision:
        - "qwen3.7-plus"
      image_generation:
        - "gpt-image-2"
      image_editing:
        - "gpt-image-2"
  models:
    deepseek-v4-pro:
      display_name: "DeepSeek V4 Pro"
      input_modalities: ["text"]
      output_modalities: ["text"]
      tool_calling: true
    qwen3.7-plus:
      display_name: "Qwen 3.7 Plus Vision"
      input_modalities: ["text", "image"]
      output_modalities: ["text"]
      tool_calling: true
    gpt-5.5:
      display_name: "GPT-5.5"
      input_modalities: ["text", "image"]
      output_modalities: ["text"]
      tool_calling: true
    gpt-image-2:
      display_name: "GPT Image 2"
      input_modalities: ["text", "image"]
      output_modalities: ["image"]
      tool_calling: false

contact:
  wechat_id: "replace-with-wechat-id"
  wechat_qr_path: "./wechat-qr.png"
  overseas: "support@example.com"

storage:
  account_store_path: "./accounts.json"

rate_limit:
  per_ip_per_hour: 3
  per_ip_per_day: 10

security:
  trust_proxy_headers: false
  client_ip_header: "X-Forwarded-For"
